version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: campushub_db
    environment:
      POSTGRES_USER: campushub_user
      POSTGRES_PASSWORD: campushub_pass
      POSTGRES_DB: campushub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campushub_user -d campushub_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: campushub_backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app          # live reload in dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
